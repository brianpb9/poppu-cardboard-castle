<script>
"use strict";
/* ============================================================================
   POPPU CARDBOARD CASTLE v2.0 — GAME-1ED823
   Creative builder for kids 3-7. Three phases × 10 levels.
   Asset manifest + procedural fallback architecture.
   Target: 8.5+ Review Board WIN vs Toca Boca / Sago Mini.
   ========================================================================== */

// ── VIRTUAL COORDINATE SYSTEM ───────────────────────────────────────────────
const DW=720, DH=1280;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let scale=1, dpr=1;

function resize(){
  const aw=window.innerWidth, ah=window.innerHeight;
  const s=Math.min(aw/DW, ah/DH);
  dpr=Math.min(window.devicePixelRatio||1,2);
  const cw=DW*s, ch=DH*s;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  canvas.width=Math.round(cw*dpr); canvas.height=Math.round(ch*dpr);
  scale=s;
}
window.addEventListener('resize',resize);
resize();

function toDesign(ex,ey){
  const r=canvas.getBoundingClientRect();
  return {x:(ex-r.left)/scale, y:(ey-r.top)/scale};
}

// ── INPUT ───────────────────────────────────────────────────────────────────
const input={x:0,y:0,down:false,dx:0,dy:0,px:0,py:0,startX:0,startY:0,tap:false,tapX:0,tapY:0};
function onDown(ex,ey){
  const p=toDesign(ex,ey); input.down=true; input.px=input.x=p.x; input.py=input.y=p.y;
  input.startX=p.x; input.startY=p.y; input.dx=0; input.dy=0;
}
function onMove(ex,ey){
  if(!input.down)return;
  const p=toDesign(ex,ey);
  input.dx=p.x-input.px; input.dy=p.y-input.py;
  input.x=p.x; input.y=p.y;
}
function onUp(ex,ey){
  if(!input.down){input.down=false;return;}
  const p=toDesign(ex,ey);
  const dist=Math.hypot(p.x-input.startX,p.y-input.startY);
  if(dist<8){input.tap=true;input.tapX=p.x;input.tapY=p.y;}
  else input.tap=false;
  input.down=false; input.dx=0; input.dy=0;
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();onDown(e.clientX,e.clientY)});
window.addEventListener('mousemove',e=>{e.preventDefault();onMove(e.clientX,e.clientY)});
window.addEventListener('mouseup',e=>{e.preventDefault();onUp(e.clientX,e.clientY)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY)}, {passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY)}, {passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];onUp(t.clientX,t.clientY)});

// ── AUDIO (Web Audio API) ───────────────────────────────────────────────────
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq,dur,type='sine',vol=0.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxSnap(){playTone(880,0.1,'triangle',0.12);setTimeout(()=>playTone(1320,0.08,'triangle',0.1),50)}
function sfxPlace(){playTone(660,0.15,'sine',0.1);setTimeout(()=>playTone(880,0.1,'sine',0.08),80)}
function sfxCollapse(){playTone(200,0.3,'sawtooth',0.08);setTimeout(()=>playTone(150,0.25,'sawtooth',0.06),150)}
function sfxCollect(){playTone(1047,0.08,'triangle',0.1);setTimeout(()=>playTone(1319,0.06,'triangle',0.08),40)}
function sfxPaint(){playTone(440,0.05,'sine',0.04)}
function sfxSticker(){playTone(587,0.08,'triangle',0.06)}
function sfxTick(){playTone(800,0.03,'square',0.05)}
function sfxCelebrate(){
  const notes=[523,659,784,1047];
  notes.forEach((n,i)=>setTimeout(()=>playTone(n,0.2,'triangle',0.12),i*120));
}
function sfxButton(){playTone(600,0.06,'sine',0.08)}

// ── ASSET MANIFEST + PROCEDURAL FALLBACKS ───────────────────────────────────
const ASSETS={};
const assetImages={};
let assetsLoaded=0, totalAssets=0, assetsReady=false;

// Procedural drawing helpers
function drawCardboardBox(ctx,x,y,w,h,color='#C4946C',tape=true){
  ctx.save();
  // Main box body
  ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
  // Corrugated edge texture
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=2;
  for(let iy=y+4;iy<y+h;iy+=10){
    ctx.beginPath();ctx.moveTo(x,iy);ctx.quadraticCurveTo(x+w/2,iy+3, x+w,iy);ctx.stroke();
  }
  // Box outline
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=3;ctx.strokeRect(x,y,w,h);
  // Tape strips
  if(tape){
    ctx.fillStyle='rgba(210,180,140,0.7)';
    ctx.fillRect(x+w*0.2,y-2,w*0.25,8);
    ctx.fillRect(x+w*0.55,y-2,w*0.25,8);
    ctx.fillRect(x-2,y+h*0.3,8,h*0.35);
    // Tape texture
    ctx.strokeStyle='rgba(180,150,110,0.5)';ctx.lineWidth=0.5;
    [x+w*0.2,y-2,w*0.25,8].forEach((_,i)=>{
      const args=[[x+w*0.2,y-2,w*0.25],[x+w*0.55,y-2,w*0.25],[x-2,y+h*0.3],[x+w-6,y+h*0.3]];
      const a=args[i];if(!a)return;
      for(let j=0;j<3;j++){ctx.beginPath();ctx.moveTo(a[0],a[1]+j*3);ctx.lineTo(a[0]+a[2],a[1]+j*3);ctx.stroke();}
    });
  }
  // Crayon scribbles
  ctx.strokeStyle='rgba(200,50,50,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(x+w*0.3,y+h*0.5,8,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(50,100,200,0.4)';
  ctx.beginPath();ctx.moveTo(x+w*0.6,y+h*0.3);ctx.lineTo(x+w*0.75,y+h*0.55);ctx.stroke();
  ctx.restore();
}

function drawTriangle(ctx,cx,cy,size,color='#F4D03F'){
  ctx.save();
  const h=size*Math.sqrt(3)/2;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(cx,cy-h*0.6);ctx.lineTo(cx-size/2,cy+h*0.4);ctx.lineTo(cx+size/2,cy+h*0.4);ctx.closePath();ctx.fill();
  // Corrugated lines
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    ctx.beginPath();ctx.moveTo(cx-size/2+i*size/8,cy+h*0.4-i*2);ctx.lineTo(cx+size/2-i*size/8,cy+h*0.4-i*2);ctx.stroke();
  }
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx,cy-h*0.6);ctx.lineTo(cx-size/2,cy+h*0.4);ctx.lineTo(cx+size/2,cy+h*0.4);ctx.closePath();ctx.stroke();
  ctx.fillStyle='rgba(210,180,140,0.6)';ctx.fillRect(cx-8,cy-15,16,6);
  ctx.restore();
}

function drawCylinder(ctx,cx,cy,w,h,color='#9B59B6'){
  ctx.save();
  ctx.fillStyle=color;ctx.fillRect(cx-w/2,cy-h/2,w,h);
  // Vertical corrugation
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1.5;
  for(let i=cx-w/2+6;i<cx+w/2;i+=8){
    ctx.beginPath();ctx.moveTo(i,cy-h/2);ctx.lineTo(i,cy+h/2);ctx.stroke();
  }
  // Top ellipse
  ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(cx,cy-h/2,w/2,h/6,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2.5;
  ctx.strokeRect(cx-w/2,cy-h/2,w,h);
  ctx.beginPath();ctx.ellipse(cx,cy-h/2,w/2,h/6,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(210,180,140,0.5)';ctx.fillRect(cx-12,cy-h/2-3,24,6);
  ctx.restore();
}

function drawCone(ctx,cx,cy,w,h,color='#FFB6C1'){
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(cx,cy-h/2);ctx.lineTo(cx-w/2,cy+h/2);ctx.lineTo(cx+w/2,cy+h/2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){const yy=cy-h/2+i*h/4+10;const ww=(w/2)*(i/4);ctx.beginPath();ctx.moveTo(cx-ww,yy);ctx.lineTo(cx+ww,yy);ctx.stroke();}
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx,cy-h/2);ctx.lineTo(cx-w/2,cy+h/2);ctx.lineTo(cx+w/2,cy+h/2);ctx.closePath();ctx.stroke();
  ctx.fillStyle='rgba(210,180,140,0.5)';ctx.fillRect(cx-6,cy-h/2+5,12,5);
  ctx.restore();
}

function drawArch(ctx,cx,cy,w,h,color='#C4946C'){
  ctx.save();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(cx-w/2,cy+h/2);ctx.lineTo(cx-w/2,cy-h/3);
  ctx.quadraticCurveTo(cx-w/2,cy-h/2,cx,cy-h/2);
  ctx.quadraticCurveTo(cx+w/2,cy-h/2,cx+w/2,cy-h/3);
  ctx.lineTo(cx+w/2,cy+h/2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx-w/2,cy+h/2);ctx.lineTo(cx-w/2,cy-h/3);
  ctx.quadraticCurveTo(cx-w/2,cy-h/2,cx,cy-h/2);
  ctx.quadraticCurveTo(cx+w/2,cy-h/2,cx+w/2,cy-h/3);
  ctx.lineTo(cx+w/2,cy+h/2);ctx.stroke();
  ctx.restore();
}

function drawWall(ctx,cx,cy,w,h,color='#C4946C'){
  ctx.save();ctx.fillStyle=color;ctx.fillRect(cx-w/2,cy-h/2,w,h);
  // Window
  const ww=w*0.4,wh=h*0.35,wx=cx-ww/2,wy=cy-wh*0.3;
  ctx.fillStyle='#87CEEB';ctx.fillRect(wx,wy,ww,wh);
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2;ctx.strokeRect(wx,wy,ww,wh);
  ctx.beginPath();ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);ctx.stroke();
  ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2.5;ctx.strokeRect(cx-w/2,cy-h/2,w,h);
  ctx.restore();
}

function drawSticker(ctx,cx,cy,r,type,color){
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.arc(cx+2,cy+2,r,0,Math.PI*2);ctx.fill();
  // White outline
  ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);ctx.fill();
  // Main shape
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  // Icon (simplified)
  ctx.fillStyle='#FFF';ctx.font=`${r*0.8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  const icons={star:'⭐',heart:'❤️',flower:'🌸',crown:'👑',rainbow:'🌈',butterfly:'🦋',sun:'☀️',puffy:'☁️'};
  ctx.fillText(icons[type]||'⭐',cx,cy);
  ctx.restore();
}

function drawCandy(ctx,cx,cy,r,type){
  ctx.save();
  if(type==='lollipop'){
    ctx.fillStyle='#8B4513';ctx.fillRect(cx-2,cy,4,r*0.6);
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(cx,cy-r*0.1,r*0.55,0,Math.PI*2);ctx.fill();
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3;ctx.fillStyle=i%2===0?'#FF4444':'#FFFFFF';
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*0.25,cy-r*0.1+Math.sin(a)*r*0.25,r*0.2,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy-r*0.1,r*0.55,0,Math.PI*2);ctx.stroke();
  }else if(type==='gummy'){
    ctx.fillStyle='#FF6B6B';
    ctx.beginPath();ctx.arc(cx-r*0.2,cy-r*0.3,r*0.18,0,Math.PI*2);ctx.fill(); // ear
    ctx.beginPath();ctx.arc(cx+r*0.2,cy-r*0.3,r*0.18,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-r*0.35,cy-r*0.1,r*0.7,r*0.5); // body
    ctx.beginPath();ctx.arc(cx,cy-r*0.1,r*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-r*0.15,cy+r*0.3,r*0.1,r*0.2);ctx.fillRect(cx+r*0.05,cy+r*0.3,r*0.1,r*0.2);
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx-r*0.2,cy-r*0.3,r*0.18,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(cx+r*0.2,cy-r*0.3,r*0.18,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy-r*0.1,r*0.35,0,Math.PI*2);ctx.stroke();
  }else if(type==='chocolate'){
    ctx.fillStyle='#5C3A1E';ctx.fillRect(cx-r*0.4,cy-r*0.4,r*0.8,r*0.8);
    ctx.fillStyle='#8B6914';ctx.fillRect(cx-r*0.3,cy-r*0.3,r*0.6,r*0.15);
    ctx.fillRect(cx-r*0.3,cy-r*0.05,r*0.6,r*0.15);
    ctx.fillRect(cx-r*0.3,cy+r*0.2,r*0.6,r*0.15);
    ctx.strokeStyle='#3A1E0A';ctx.lineWidth=2;ctx.strokeRect(cx-r*0.4,cy-r*0.4,r*0.8,r*0.8);
  }else if(type==='star'){
    ctx.fillStyle='#FFD700';
    ctx.beginPath();for(let i=0;i<5;i++){const a=i*4*Math.PI/5-Math.PI/2;const rr=i%2===0?r*0.45:r*0.2;ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}ctx.closePath();ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.restore();
}

function drawSparkle(ctx,cx,cy,r,alpha=1){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle='#FFD700';
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3;const s=r*(i%2===0?1:0.4);
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*s,cy+Math.sin(a)*s);
    ctx.lineTo(cx+Math.cos(a+0.3)*r*0.15,cy+Math.sin(a+0.3)*r*0.15);
    ctx.lineTo(cx+Math.cos(a)*r*0.3,cy+Math.sin(a)*r*0.3);
    ctx.lineTo(cx+Math.cos(a-0.3)*r*0.15,cy+Math.sin(a-0.3)*r*0.15);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawTemplate(ctx,cx,cy,w,h,pieces){
  ctx.save();
  ctx.strokeStyle='rgba(90,60,30,0.4)';ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.strokeRect(cx-w/2,cy-h/2,w,h);
  // Piece outlines
  pieces.forEach(p=>{
    const px=cx-w/2+p.x, py=cy-h/2+p.y;
    ctx.strokeStyle='rgba(90,60,30,0.25)';
    if(p.shape==='box')ctx.strokeRect(px-p.w/2,py-p.h/2,p.w,p.h);
    else if(p.shape==='triangle'){ctx.beginPath();ctx.moveTo(px,py-p.h*0.45);ctx.lineTo(px-p.w/2,py+p.h*0.35);ctx.lineTo(px+p.w/2,py+p.h*0.35);ctx.closePath();ctx.stroke();}
    else if(p.shape==='cylinder'){ctx.strokeRect(px-p.w/2,py-p.h/2,p.w,p.h);ctx.beginPath();ctx.ellipse(px,py-p.h/2,p.w/2,p.h/6,0,0,Math.PI*2);ctx.stroke();}
    else if(p.shape==='cone'){ctx.beginPath();ctx.moveTo(px,py-p.h/2);ctx.lineTo(px-p.w/2,py+p.h/2);ctx.lineTo(px+p.w/2,py+p.h/2);ctx.closePath();ctx.stroke();}
    else if(p.shape==='arch'){ctx.beginPath();ctx.moveTo(px-p.w/2,py+p.h/2);ctx.lineTo(px-p.w/2,py-p.h/3);ctx.quadraticCurveTo(px-p.w/2,py-p.h/2,px,py-p.h/2);ctx.quadraticCurveTo(px+p.w/2,py-p.h/2,px+p.w/2,py-p.h/3);ctx.lineTo(px+p.w/2,py+p.h/2);ctx.stroke();}
    else if(p.shape==='wall')ctx.strokeRect(px-p.w/2,py-p.h/2,p.w,p.h);
  });
  ctx.setLineDash([]);
  ctx.restore();
}

// ── ASSET REGISTRY ──────────────────────────────────────────────────────────
function registerAsset(name,file,fallbackFn){
  ASSETS[name]={file,fallback:fallbackFn,img:null,loaded:false};
  totalAssets++;
}
function loadAssets(callback){
  let attempted=0;
  for(const[key,a]of Object.entries(ASSETS)){
    if(!a.file){attempted++;a.loaded=false;continue;}
    const img=new Image();
    img.onload=()=>{a.img=img;a.loaded=true;assetsLoaded++;checkDone()};
    img.onerror=()=>{a.loaded=false;attempted++;checkDone()};
    img.src=a.file;
  }
  function checkDone(){
    attempted++;
    if(attempted>=totalAssets){assetsReady=true;if(callback)callback();}
  }
}
function drawAsset(ctx,name,x,y,w,h,opts={}){
  const a=ASSETS[name];
  if(a&&a.loaded&&a.img){
    ctx.drawImage(a.img,x,y,w,h);
  }else if(a&&a.fallback){
    a.fallback(ctx,x,y,w,h,opts);
  }
}
function drawAssetCentered(ctx,name,cx,cy,w,h,opts={}){
  drawAsset(ctx,name,cx-w/2,cy-h/2,w,h,opts);
}

// Register all assets
registerAsset('bg-craft-table','assets/bg-craft-table.webp',(ctx,x,y,w,h)=>{
  const grad=ctx.createRadialGradient(DW/2,DH*0.3,50,DW/2,DH*0.3,DH);
  grad.addColorStop(0,'#F5DEB3');grad.addColorStop(0.5,'#DEB887');grad.addColorStop(1,'#A0784C');
  ctx.fillStyle=grad;ctx.fillRect(x,y,w,h);
});
registerAsset('bg-play-room','assets/bg-play-room.webp',(ctx,x,y,w,h)=>{
  const grad=ctx.createRadialGradient(DW/2,DH*0.3,50,DW/2,DH*0.3,DH);
  grad.addColorStop(0,'#FFF8DC');grad.addColorStop(0.5,'#FAEBD7');grad.addColorStop(1,'#D2B48C');
  ctx.fillStyle=grad;ctx.fillRect(x,y,w,h);
});
registerAsset('bg-celebration','assets/bg-celebration.webp',(ctx,x,y,w,h)=>{
  const grad=ctx.createRadialGradient(DW/2,DH*0.3,50,DW/2,DH*0.3,DH);
  grad.addColorStop(0,'#FFF0F5');grad.addColorStop(0.5,'#FFE4E1');grad.addColorStop(1,'#FFB6C1');
  ctx.fillStyle=grad;ctx.fillRect(x,y,w,h);
});

// Cardboard pieces
registerAsset('piece-box-brown','assets/piece-box-brown.png',(ctx,x,y,w,h)=>drawCardboardBox(ctx,x,y,w,h,'#C4946C'));
registerAsset('piece-box-red','assets/piece-box-brown.png',(ctx,x,y,w,h)=>drawCardboardBox(ctx,x,y,w,h,'#E74C3C'));
registerAsset('piece-box-blue','assets/piece-box-brown.png',(ctx,x,y,w,h)=>drawCardboardBox(ctx,x,y,w,h,'#5DADE2'));
registerAsset('piece-triangle-yellow','assets/piece-triangle-yellow.png',(ctx,x,y,w,h)=>drawTriangle(ctx,x+w/2,y+h/2,Math.min(w,h),'#F4D03F'));

// ── PROGRESS / SAVE DATA ────────────────────────────────────────────────────
function defaultProgress(){
  return {
    unlocked:1, // Level 1 ALWAYS unlocked (critical fix for Level 1 gating bug)
    stars:{},stickerBook:{},
    highScores:{},decoratedCastles:{}
  };
}
let progress=defaultProgress();

function loadProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('poppu-castle-progress'));
    if(d&&typeof d.unlocked==='number'){
      progress=d;
      if(progress.unlocked<1)progress.unlocked=1; // Ensure Level 1 always unlocked
    }
  }catch(e){progress=defaultProgress();}
}
function saveProgress(){
  try{localStorage.setItem('poppu-castle-progress',JSON.stringify(progress));}catch(e){}
}
loadProgress();

function unlockLevel(lvl){
  if(lvl<=MAX_LEVELS&&lvl>progress.unlocked)progress.unlocked=lvl;
  saveProgress();
}
function addStars(lvl,count){
  if(!progress.stars[lvl]||count>progress.stars[lvl])progress.stars[lvl]=count;
  saveProgress();
}
function addSticker(type){progress.stickerBook[type]=true;saveProgress();}
function totalStars(){let s=0;for(let i=1;i<=MAX_LEVELS;i++)s+=(progress.stars[i]||0);return s;}

let buildPieces=[], buildPlaced=[], buildDragging=null, buildDragOffX=0, buildDragOffY=0;
let buildCollapsing=null, buildCollapseTimer=0, buildCollapsePieces=[];
let buildComplete=false;

function initBuildPhase(lvl){
  const level=LEVELS[lvl-1];
  buildComplete=false;
  buildCollapsing=null;buildCollapseTimer=0;buildCollapsePieces=[];
  // Create pieces in tray (shuffled)
  const reqs=[...level.requirements];
  // Add some extra pieces for variety on higher levels
  if(lvl>=3)reqs.push({id:'extra-red',shape:'box',asset:'piece-box-red',x:0,y:0,w:80,h:70,extra:true});
  if(lvl>=5)reqs.push({id:'extra-blue',shape:'box',asset:'piece-box-blue',x:0,y:0,w:80,h:70,extra:true});
  if(lvl>=7)reqs.push({id:'extra-teal',shape:'cone',asset:'piece-cone-teal',x:0,y:0,w:70,h:80,extra:true});
  // Shuffle
  for(let i=reqs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[reqs[i],reqs[j]]=[reqs[j],reqs[i]];}
  buildPieces=reqs.map((r,i)=>({
    ...r,
    x:60+(i%5)*130, y:DH-180+Math.floor(i/5)*110,
    placed:false, rot:0, tilt:0, collapsing:false
  }));
  buildPlaced=[];
  buildDragging=null;
}

// ── ANIMATION PARTICLES ─────────────────────────────────────────────────────
let particles=[];
function spawnParticles(cx,cy,count,color='#FFD700'){
  for(let i=0;i<count;i++){
    particles.push({
      x:cx,y:cy,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-3,
      life:1,decay:0.015+Math.random()*0.03,size:3+Math.random()*5,color
    });
  }
}

// ── BUTTON HIT TESTING ──────────────────────────────────────────────────────
function hitRect(px,py,x,y,w,h){return px>=x&&px<=x+w&&py>=y&&py<=y+h;}
function hitCircle(px,py,cx,cy,r){return Math.hypot(px-cx,py-cy)<=r;}

// ── MAIN GAME LOOP ──────────────────────────────────────────────────────────
let lastTime=0,frameCount=0,enteredFrame=false;

function update(dt){
  // Clamp dt to avoid physics explosions
  const d=Math.min(dt,0.1);

  if(gameState===STATE.BUILD)updateBuild(d);
  else if(gameState===STATE.PLAY)updatePlay(d);

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*d*60;p.y+=p.vy*d*60;p.life-=p.decay*d*60;
    if(p.life<=0)particles.splice(i,1);
  }
}

function updateBuild(dt){
  // Collapse animation
  if(buildCollapsing){
    buildCollapseTimer+=dt;
    buildCollapsePieces.forEach(p=>{
      p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;
      p.vy+=300*dt;
      p.rot+=p.rv*dt*60;
    });
    if(buildCollapseTimer>1.5){
      buildCollapsing=null;
      buildCollapsePieces=[];
      sfxCollapse();
      // Reset unplaced pieces
      buildPieces.forEach(p=>{
        if(!p.placed&&!p.extra&&p.collapsing)p.collapsing=false;
      });
    }
  }

  // Update drag
  if(buildDragging&&input.down){
    buildDragging.x=input.x-buildDragOffX;
    buildDragging.y=input.y-buildDragOffY;
    // Check tilt
    const dx=input.x-input.startX,dy=input.y-input.startY;
    const tilt=Math.abs(dx)>40||Math.abs(dy)>40?Math.atan2(dy,dx):0;
    buildDragging.tilt=tilt;
    if(Math.abs(tilt)>Math.PI/12&&!buildCollapsing){ // >15°
      triggerCollapse();
    }
  }
}

function triggerCollapse(){
  if(buildCollapsing)return;
  buildCollapsing=true;buildCollapseTimer=0;
  buildCollapsePieces=[];
  // All currently placed pieces scatter
  const allPieces=[...buildPieces.filter(p=>p.placed),...buildPieces.filter(p=>!p.placed&&!p.extra)];
  allPieces.forEach(p=>{
    p.collapsing=true;
    buildCollapsePieces.push({
      ...p,
      vx:(Math.random()-0.5)*400,vy:-200-Math.random()*300,
      rv:(Math.random()-0.5)*10
    });
  });
  buildPlaced=[];
  buildPieces.forEach(p=>{p.placed=false;});
  buildDragging=null;
  buildComplete=false;
}

function updatePlay(dt){
  if(playGameOver)return;
  if(!playStartTime)playStartTime=performance.now()/1000;

  const elapsed=(performance.now()/1000)-playStartTime;
  playTimeLeft=Math.max(0,playTimer-elapsed);

  if(playTimeLeft<=0){
    playGameOver=true;
    sfxCelebrate();
    const stars=playScore>=15?3:playScore>=10?2:playScore>=5?1:0;
    addStars(currentLevel,stars);
    if(stars>=1)unlockLevel(currentLevel+1);
    if(stars>=2&&!progress.stickerBook[currentLevel])addSticker(`level${currentLevel}`);
    return;
  }

  // Spawn candies
  if(Math.random()<0.03*dt*60)spawnCandy();

  // Update candies
  const floorY=DH-250;
  for(let i=playCandies.length-1;i>=0;i--){
    const c=playCandies[i];
    if(!c.active)continue;
    c.vy+=0.05*dt*60; // gravity
    c.x+=c.vx*dt*60;c.y+=c.vy*dt*60;
    c.rot+=c.rotV*dt*60;
    c.wobble+=0.03*dt*60;
    // Bounce off edges
    if(c.x<40||c.x>DW-40)c.vx*=-0.5;
    if(c.y>floorY){
      c.y=floorY;
      c.vy*=-0.3;
      if(Math.abs(c.vy)<0.5){c.vy=0;c.vx*=0.8;}
    }
    // Remove if off screen top
    if(c.y<-100)playCandies.splice(i,1);
  }

  // Update sparkles
  for(let i=playSparkles.length-1;i>=0;i--){
    const s=playSparkles[i];
    s.life-=0.03*dt*60;
    if(s.life<=0)playSparkles.splice(i,1);
  }

  // Update score popups
  for(let i=playScorePopups.length-1;i>=0;i--){
    const p=playScorePopups[i];
    p.y-=2*dt*60;p.life-=0.02*dt*60;
    if(p.life<=0)playScorePopups.splice(i,1);
  }
}

function draw(){
  ctx.save();
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  ctx.clearRect(0,0,DW,DH);

  // Always draw on virtual 720x1280
  switch(gameState){
    case STATE.START:drawStartScreen();break;
    case STATE.LEVEL_SELECT:drawLevelSelect();break;
    case STATE.BUILD:drawBuildPhase();break;
    case STATE.DECORATE:drawDecoratePhase();break;
    case STATE.PLAY:drawPlayPhase();break;
    case STATE.RESULT:drawResultScreen();break;
  }

  // Draw particles (overlay)
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  ctx.restore();
}

// ── LEVEL SELECT ────────────────────────────────────────────────────────────
function drawLevelSelect(){
  const grad=ctx.createLinearGradient(0,0,0,DH);
  grad.addColorStop(0,'#E8D5B7');grad.addColorStop(1,'#C4A882');
  ctx.fillStyle=grad;ctx.fillRect(0,0,DW,DH);

  // Title
  ctx.fillStyle='#5C3A1E';ctx.font='bold 36px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('Choose Your Castle!',DW/2,80);

  // Star counter
  ctx.fillStyle='#8B6914';ctx.font='22px "Comic Sans MS","Baloo 2",system-ui';
  ctx.fillText(`⭐ ${totalStars()}/30 Stars Collected`,DW/2,120);

  // Winding path
  const pathY=180,pathEndY=DH-80;
  const stepY=(pathEndY-pathY)/(MAX_LEVELS-1);
  ctx.strokeStyle='#8B7355';ctx.lineWidth=12;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(DW/2,pathY);
  for(let i=1;i<MAX_LEVELS;i++){
    const x=DW/2+(i%2===0?-120:120);
    ctx.lineTo(x,pathY+i*stepY);
  }
  ctx.stroke();

  // Level nodes
  for(let i=0;i<MAX_LEVELS;i++){
    const lvl=i+1;
    const nx=DW/2+(i%2===0?-120:120),ny=pathY+i*stepY;
    const locked=lvl>progress.unlocked;
    const stars=progress.stars[lvl]||0;

    // Node circle
    if(locked){
      ctx.fillStyle='#999';ctx.beginPath();ctx.arc(nx,ny,30,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#666';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='#CCC';ctx.font='bold 20px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
      ctx.fillText('🔒',nx,ny+7);
    }else{
      const col=stars>=3?'#FFD700':stars>=2?'#C0C0C0':stars>=1?'#CD7F32':'#8B7355';
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(nx,ny,30,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#5C3A1E';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='#FFF';ctx.font='bold 22px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
      ctx.fillText(lvl,nx,ny+8);
    }

    // Stars under node
    if(!locked){
      ctx.fillStyle='#5C3A1E';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';
      const starStr='★'.repeat(stars)+'☆'.repeat(3-stars);
      ctx.fillText(starStr,nx,ny+55);
    }

    // Level name
    ctx.fillStyle=locked?'#999':'#5C3A1E';
    ctx.font='12px "Comic Sans MS","Baloo 2",system-ui';
    ctx.fillText(LEVELS[i].name,nx,ny+75);
  }

  // Back button
  ctx.fillStyle='#E74C3C';ctx.beginPath();roundRect(ctx,20,20,100,45,15);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 18px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('← Back',70,50);

  // Tap handler
  if(input.tap){
    input.tap=false;
    if(hitRect(input.tapX,input.tapY,20,20,100,45)){sfxButton();gameState=STATE.START;return;}
    for(let i=0;i<MAX_LEVELS;i++){
      const nx=DW/2+(i%2===0?-120:120),ny=pathY+i*stepY;
      if(hitCircle(input.tapX,input.tapY,nx,ny,35)){
        const lvl=i+1;
        if(lvl<=progress.unlocked){
          sfxButton();
          currentLevel=lvl;
          initBuildPhase(lvl);
          gameState=STATE.BUILD;
          enteredFrame=true;
        }
        return;
      }
    }
  }
}

// ── BUILD PHASE ─────────────────────────────────────────────────────────────
function drawBuildPhase(){
  const level=LEVELS[currentLevel-1];

  // Background
  drawAsset(ctx,'bg-craft-table',0,0,DW,DH);

  // Template area
  const tx=100,ty=80,tw=520,th=550;
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(tx,ty,tw,th);
  ctx.strokeStyle='rgba(90,60,30,0.5)';ctx.lineWidth=3;ctx.setLineDash([10,8]);
  ctx.strokeRect(tx,ty,tw,th);ctx.setLineDash([]);

  // Template outlines for unplaced pieces
  level.requirements.forEach(r=>{
    if(buildPlaced.find(p=>p.id===r.id))return;
    const px=tx+r.x,py=ty+r.y;
    ctx.strokeStyle='rgba(90,60,30,0.35)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    if(r.shape==='box')ctx.strokeRect(px-r.w/2,py-r.h/2,r.w,r.h);
    else if(r.shape==='triangle'){
      ctx.beginPath();ctx.moveTo(px,py-r.h*0.45);ctx.lineTo(px-r.w/2,py+r.h*0.35);ctx.lineTo(px+r.w/2,py+r.h*0.35);ctx.closePath();ctx.stroke();
    }else if(r.shape==='cylinder'){
      ctx.strokeRect(px-r.w/2,py-r.h/2,r.w,r.h);ctx.beginPath();ctx.ellipse(px,py-r.h/2,r.w/2,r.h/6,0,0,Math.PI*2);ctx.stroke();
    }else if(r.shape==='cone'){
      ctx.beginPath();ctx.moveTo(px,py-r.h/2);ctx.lineTo(px-r.w/2,py+r.h/2);ctx.lineTo(px+r.w/2,py+r.h/2);ctx.closePath();ctx.stroke();
    }else if(r.shape==='arch'){
      ctx.beginPath();ctx.moveTo(px-r.w/2,py+r.h/2);ctx.lineTo(px-r.w/2,py-r.h/3);
      ctx.quadraticCurveTo(px-r.w/2,py-r.h/2,px,py-r.h/2);
      ctx.quadraticCurveTo(px+r.w/2,py-r.h/2,px+r.w/2,py-r.h/3);
      ctx.lineTo(px+r.w/2,py+r.h/2);ctx.stroke();
    }else if(r.shape==='wall')ctx.strokeRect(px-r.w/2,py-r.h/2,r.w,r.h);
    ctx.setLineDash([]);
  });

  // Draw placed pieces
  buildPlaced.forEach(p=>{
    const px=tx+p.x,py=ty+p.y;
    drawPiece(px-p.w/2,py-p.h/2,p.w,p.h,p.shape,p.asset,p.rot);
  });

  // Draw collapse pieces
  if(buildCollapsing){
    buildCollapsePieces.forEach(p=>{
      const px=tx+p.x,py=ty+p.y;
      ctx.save();ctx.translate(px,py);ctx.rotate(p.rot);
      drawPiece(-p.w/2,-p.h/2,p.w,p.h,p.shape,p.asset,0);
      ctx.restore();
    });
  }

  // Progress bar
  const placedCount=buildPlaced.length,totalPieces=level.pieces;
  const pbx=60,pby=DH-230,pbw=DW-120,pbh=24;
  ctx.fillStyle='#DEB887';ctx.fillRect(pbx,pby,pbw,pbh);
  ctx.strokeStyle='#8B7355';ctx.lineWidth=3;ctx.strokeRect(pbx,pby,pbw,pbh);
  const progressFrac=placedCount/totalPieces;
  ctx.fillStyle='#58D68D';ctx.fillRect(pbx,pby,pbw*progressFrac,pbh);
  ctx.fillStyle='#5C3A1E';ctx.font='bold 16px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText(`${placedCount}/${totalPieces} pieces`,DW/2,pby+18);

  // Piece tray
  const trayY=DH-190;
  ctx.fillStyle='rgba(139,115,85,0.3)';ctx.fillRect(10,trayY,DW-20,180);
  ctx.strokeStyle='#8B7355';ctx.lineWidth=2;ctx.strokeRect(10,trayY,DW-20,180);
  ctx.fillStyle='#5C3A1E';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';
  ctx.fillText('Drag pieces up!',DW/2,trayY+20);

  // Draw pieces in tray
  buildPieces.forEach(p=>{
    if(p.placed||(buildCollapsing&&p.collapsing))return;
    if(p===buildDragging)return; // drawn separately
    drawPiece(p.x-35,p.y-30,70,60,p.shape,p.asset,p.rot);
  });

  // Draw dragging piece
  if(buildDragging&&input.down){
    const dp=buildDragging;
    ctx.save();ctx.globalAlpha=0.85;
    drawPiece(dp.x-dp.w/2,dp.y-dp.h/2,dp.w,dp.h,dp.shape,dp.asset,dp.rot+(dp.tilt||0));
    ctx.restore();
  }

  // Level title
  ctx.fillStyle='#5C3A1E';ctx.font='bold 24px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText(`Level ${currentLevel}: ${level.name}`,DW/2,55);

  // Peeky tutorial (Level 1 only)
  if(currentLevel===1&&placedCount===0&&!buildCollapsing){
    drawAssetCentered(ctx,'peeky-tutorial',580,200,80,80);
    ctx.fillStyle='#FFF';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
    ctx.fillStyle='#5C3A1E';
    // Speech bubble
    ctx.fillStyle='#FFF';ctx.beginPath();roundRect(ctx,470,130,200,60,15);ctx.fill();
    ctx.strokeStyle='#5C3A1E';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#5C3A1E';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';
    ctx.fillText('Drag the pieces to',570,155);
    ctx.fillText('build your castle!',570,175);
  }

  // Done button (visible when all required pieces placed)
  if(placedCount>=totalPieces){
    const dbx=DW/2-80,dby=DH-240,dbw=160,dbh=50;
    ctx.fillStyle='#58D68D';ctx.beginPath();roundRect(ctx,dbx,dby,dbw,dbh,15);ctx.fill();
    ctx.strokeStyle='#2E7D32';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 22px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
    ctx.fillText('Done! ✓',DW/2,dby+35);
    if(input.tap&&hitRect(input.tapX,input.tapY,dbx,dby,dbw,dbh)){
      input.tap=false;sfxPlace();initDecoratePhase();gameState=STATE.DECORATE;
    }
  }

  // Back button
  ctx.fillStyle='#E74C3C';ctx.beginPath();roundRect(ctx,20,20,100,40,12);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 16px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('← Levels',70,47);
  if(input.tap&&hitRect(input.tapX,input.tapY,20,20,100,40)){input.tap=false;sfxButton();gameState=STATE.LEVEL_SELECT;}

  // Handle drag-drop
  handleBuildInput(tx,ty);
}

function drawPiece(x,y,w,h,shape,asset,rot){
  ctx.save();
  ctx.translate(x+w/2,y+h/2);
  if(rot)ctx.rotate(rot);
  ctx.translate(-w/2,-h/2);
  if(asset)drawAsset(ctx,asset,x,y,w,h);
  else{
    // Generic fallback
    switch(shape){
      case 'box':drawCardboardBox(ctx,x,y,w,h);break;
      case 'triangle':drawTriangle(ctx,x+w/2,y+h/2,Math.min(w,h));break;
      case 'cylinder':drawCylinder(ctx,x+w/2,y+h/2,w,h);break;
      case 'cone':drawCone(ctx,x+w/2,y+h/2,w,h);break;
      case 'arch':drawArch(ctx,x+w/2,y+h/2,w,h);break;
      case 'wall':drawWall(ctx,x+w/2,y+h/2,w,h);break;
      default:drawCardboardBox(ctx,x,y,w,h);
    }
  }
  ctx.restore();
}

function handleBuildInput(tx,ty){
  const level=LEVELS[currentLevel-1];
  if(!enteredFrame){enteredFrame=true;return;}

  // Start drag
  if(input.down&&!buildDragging&&!buildCollapsing){
    for(let i=buildPieces.length-1;i>=0;i--){
      const p=buildPieces[i];
      if(p.placed)continue;
      if(hitRect(input.startX,input.startY,p.x-35,p.y-30,70,60)){
        buildDragging=p;
        buildDragOffX=input.startX-p.x;
        buildDragOffY=input.startY-p.y;
        sfxSnap();
        break;
      }
    }
  }

  // End drag
  if(!input.down&&buildDragging){
    const dp=buildDragging;
    // Check snap to template
    let snapped=false;
    for(const r of level.requirements){
      if(buildPlaced.find(pp=>pp.id===r.id))continue;
      const rx=tx+r.x,ry=ty+r.y;
      const dist=Math.hypot(dp.x+dp.w/2-rx,dp.y+dp.h/2-ry);
      if(dist<40&&r.shape===dp.shape){
        dp.x=rx-dp.w/2;dp.y=ry-dp.h/2;
        dp.placed=true;dp.rot=0;dp.tilt=0;
        buildPlaced.push({...dp,id:r.id});
        sfxPlace();
        spawnParticles(rx,ry,12,'#FFD700');
        snapped=true;
        break;
      }
    }
    if(!snapped&&dp.y<DH-220){
      // Check tilt — if >15°, collapse
      if(Math.abs(dp.tilt||0)>Math.PI/12){
        triggerCollapse();
      }
    }
    // If not snapped and back in tray area, keep it
    buildDragging=null;
  }
}

// ── DECORATE PHASE ──────────────────────────────────────────────────────────
function drawDecoratePhase(){
  const level=LEVELS[currentLevel-1];

  // Background
  drawAsset(ctx,'bg-play-room',0,0,DW,DH);

  // Draw built castle
  ctx.save();
  const tx=100,ty=80;
  level.requirements.forEach(r=>{
    const placed=buildPlaced.find(p=>p.id===r.id);
    if(!placed)return;
    const px=tx+r.x,py=ty+r.y;
    ctx.save();
    // Check for paint
    const paint=decoratePaints.find(pp=>pp.pieceId===r.id);
    ctx.translate(px,py);
    drawPiece(-r.w/2,-r.h/2,r.w,r.h,r.shape,r.asset,0);
    if(paint){
      ctx.globalAlpha=0.3;
      ctx.fillStyle=paint.color;ctx.fillRect(-r.w/2,-r.h/2,r.w,r.h);
      ctx.globalAlpha=1;
    }
    ctx.restore();
  });
  // Draw flag on highest piece
  if(decorateFlag){
    const topPiece=level.requirements.reduce((a,b)=>a.y<b.y?a:b);
    const pp=buildPlaced.find(p=>p.id===topPiece.id);
    if(pp){
      const px=tx+topPiece.x;
      ctx.fillStyle='#8B4513';ctx.fillRect(px-2,ty+topPiece.y-topPiece.h/2-60,4,50);
      ctx.fillStyle='#FF6B6B';ctx.beginPath();ctx.moveTo(px,ty+topPiece.y-topPiece.h/2-60);
      ctx.lineTo(px+30,ty+topPiece.y-topPiece.h/2-50);ctx.lineTo(px,ty+topPiece.y-topPiece.h/2-40);ctx.closePath();ctx.fill();
    }
  }
  ctx.restore();

  // Stickers placed
  decorateStickers.forEach(s=>{
    drawSticker(ctx,s.x,s.y,s.r,s.type,s.color);
  });

  // Tools panel
  const toolsY=DH-200;
  ctx.fillStyle='rgba(139,115,85,0.35)';ctx.fillRect(0,toolsY,DW,200);
  ctx.strokeStyle='#8B7355';ctx.lineWidth=2;ctx.strokeRect(0,toolsY,DW,200);

  // Crayon colors
  ctx.fillStyle='#5C3A1E';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('Paint',DW/2,toolsY+20);
  CRAYON_COLORS.forEach((c,i)=>{
    const cx=50+i*60,cy=toolsY+45,r=18;
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=i===decorateSelectedColor?'#333':'#AAA';ctx.lineWidth=i===decorateSelectedColor?4:2;
    ctx.stroke();
    if(input.tap&&hitCircle(input.tapX,input.tapY,cx,cy,r)){
      input.tap=false;decorateSelectedColor=i;sfxPaint();
    }
  });

  // Flag button
  const flagX=DW-120,flagY=toolsY+30;
  ctx.fillStyle='#FF6B6B';ctx.beginPath();roundRect(ctx,flagX,flagY,100,40,10);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 16px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('🚩 Flag',flagX+50,flagY+28);
  if(input.tap&&hitRect(input.tapX,input.tapY,flagX,flagY,100,40)){input.tap=false;decorateFlag=!decorateFlag;sfxSticker();}

  // Stickers
  ctx.fillStyle='#5C3A1E';ctx.font='14px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('Stickers',DW/2,toolsY+85);
  STICKER_TYPES.forEach((t,i)=>{
    const sx=40+i*80,sy=toolsY+110,sr=22;
    drawSticker(ctx,sx,sy,sr,t,STICKER_COLORS[i]);
    // Drag sticker
    if(input.down&&hitCircle(input.startX,input.startY,sx,sy,sr)&&!decorateDraggingSticker){
      decorateDraggingSticker={type:t,color:STICKER_COLORS[i],r:sr,x:input.x,y:input.y};
    }
  });

  // Dragging sticker
  if(decorateDraggingSticker&&input.down){
    const ds=decorateDraggingSticker;
    ds.x=input.x;ds.y=input.y;
    drawSticker(ctx,ds.x,ds.y,ds.r,ds.type,ds.color);
    if(!input.down){
      // Place sticker on castle area
      if(ds.y>50&&ds.y<DH-220){
        decorateStickers.push({x:ds.x,y:ds.y,r:ds.r,type:ds.type,color:ds.color});
        sfxSticker();
        spawnParticles(ds.x,ds.y,8,ds.color);
      }
      decorateDraggingSticker=null;
    }
  }

  // Paint tap on castle
  if(input.tap&&input.tapY>ty&&input.tapY<ty+550&&input.tapX>tx&&input.tapX<tx+520){
    input.tap=false;
    // Find which piece was tapped
    for(const r of level.requirements){
      const px=tx+r.x,py=ty+r.y;
      if(hitRect(input.tapX,input.tapY,px-r.w/2,py-r.h/2,r.w,r.h)){
        const existing=decoratePaints.findIndex(pp=>pp.pieceId===r.id);
        if(existing>=0)decoratePaints[existing].color=CRAYON_COLORS[decorateSelectedColor];
        else decoratePaints.push({pieceId:r.id,color:CRAYON_COLORS[decorateSelectedColor]});
        sfxPaint();
        spawnParticles(input.tapX,input.tapY,6,CRAYON_COLORS[decorateSelectedColor]);
        break;
      }
    }
  }

  // Done button
  const dbx=DW/2-80,dby=DH-40,dbw=160,dbh=35;
  ctx.fillStyle='#58D68D';ctx.beginPath();roundRect(ctx,dbx,dby,dbw,dbh,12);ctx.fill();
  ctx.strokeStyle='#2E7D32';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#FFF';ctx.font='bold 18px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('Play! 🎉',DW/2,dby+26);
  if(input.tap&&hitRect(input.tapX,input.tapY,dbx,dby,dbw,dbh)){
    input.tap=false;sfxCelebrate();initPlayPhase();gameState=STATE.PLAY;
  }
}

// ── PLAY PHASE ──────────────────────────────────────────────────────────────
function drawPlayPhase(){
  const level=LEVELS[currentLevel-1];

  // Background
  drawAsset(ctx,'bg-celebration',0,0,DW,DH);

  // Draw castle (built structure)
  const tx=100,ty=80;
  ctx.save();
  level.requirements.forEach(r=>{
    const placed=buildPlaced.find(p=>p.id===r.id);
    if(!placed)return;
    const px=tx+r.x,py=ty+r.y;
    const paint=decoratePaints.find(pp=>pp.pieceId===r.id);
    ctx.save();ctx.translate(px,py);
    drawPiece(-r.w/2,-r.h/2,r.w,r.h,r.shape,r.asset,0);
    if(paint){ctx.globalAlpha=0.3;ctx.fillStyle=paint.color;ctx.fillRect(-r.w/2,-r.h/2,r.w,r.h);}
    ctx.restore();
  });
  if(decorateFlag){
    const topPiece=level.requirements.reduce((a,b)=>a.y<b.y?a:b);
    const pp2=buildPlaced.find(p=>p.id===topPiece.id);
    if(pp2){
      const pxx=tx+topPiece.x;
      ctx.fillStyle='#8B4513';ctx.fillRect(pxx-2,ty+topPiece.y-topPiece.h/2-60,4,50);
      ctx.fillStyle='#FF6B6B';ctx.beginPath();ctx.moveTo(pxx,ty+topPiece.y-topPiece.h/2-60);
      ctx.lineTo(pxx+30,ty+topPiece.y-topPiece.h/2-50);ctx.lineTo(pxx,ty+topPiece.y-topPiece.h/2-40);ctx.closePath();ctx.fill();
    }
  }
  decorateStickers.forEach(s=>{drawSticker(ctx,s.x,s.y,s.r,s.type,s.color);});
  ctx.restore();

  // Poppu at entrance
  const doorPiece=level.requirements.find(r=>r.shape==='arch');
  if(doorPiece){
    const doorPlaced=buildPlaced.find(p=>p.id===doorPiece.id);
    if(doorPlaced)drawAssetCentered(ctx,'poppu-play',tx+doorPiece.x-30,ty+doorPiece.y,70,90);
    else drawAssetCentered(ctx,'poppu-play',tx+260,ty+400,70,90);
  }else{
    drawAssetCentered(ctx,'poppu-play',tx+260,ty+400,70,90);
  }

  // Draw candies
  playCandies.forEach(c=>{
    if(!c.active)return;
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);
    drawCandy(ctx,0,0,c.r,c.type);
    ctx.restore();
  });

  // Draw sparkles
  playSparkles.forEach(s=>{
    drawSparkle(ctx,s.x,s.y,s.r,s.life);
  });

  // Draw score popups
  playScorePopups.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle='#FFD700';ctx.font='bold 24px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
    ctx.fillText(`+1`,p.x,p.y);
    ctx.restore();
  });

  // Timer bar
  const tbx=100,tby=DH-100,tbw=DW-200,tbh=24;
  ctx.fillStyle='#DEB887';ctx.fillRect(tbx,tby,tbw,tbh);
  ctx.strokeStyle='#8B7355';ctx.lineWidth=3;ctx.strokeRect(tbx,tby,tbw,tbh);
  const timeFrac=playTimeLeft/playTimer;
  ctx.fillStyle=timeFrac>0.3?'#58D68D':timeFrac>0.15?'#F4D03F':'#E74C3C';
  ctx.fillRect(tbx,tby,tbw*timeFrac,tbh);

  // Timer text
  ctx.fillStyle='#5C3A1E';ctx.font='bold 18px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(playTimeLeft)}s`,DW/2,tby+18);

  // Score
  ctx.fillStyle='#5C3A1E';ctx.font='bold 28px "Comic Sans MS","Baloo 2",system-ui';
  ctx.fillText(`Candies: ${playScore}`,DW/2,tby-25);

  // Tap candy to collect
  if(input.tap&&!playGameOver){
    input.tap=false;
    for(let i=playCandies.length-1;i>=0;i--){
      const c=playCandies[i];
      if(!c.active)continue;
      if(hitCircle(input.tapX,input.tapY,c.x,c.y,c.r+10)){
        c.active=false;
        playScore++;
        playSparkles.push({x:c.x,y:c.y,r:c.r,life:1});
        playScorePopups.push({x:c.x,y:c.y-20,life:1});
        sfxCollect();
        spawnParticles(c.x,c.y,8,'#FFD700');
        playCandies.splice(i,1);
        break;
      }
    }
  }

  // Game over
  if(playGameOver){
    const stars=playScore>=15?3:playScore>=10?2:playScore>=5?1:0;
    // Overlay
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,DW,DH);
    // Panel
    ctx.fillStyle='#FFF';ctx.beginPath();roundRect(ctx,DW/2-150,DH/2-150,300,300,20);ctx.fill();
    ctx.strokeStyle='#8B7355';ctx.lineWidth=4;ctx.stroke();
    ctx.fillStyle='#5C3A1E';ctx.font='bold 30px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
    ctx.fillText('Great Job!',DW/2,DH/2-90);
    ctx.fillText(`${playScore} Candies`,DW/2,DH/2-45);
    const starsStr='★'.repeat(stars)+'☆'.repeat(3-stars);
    ctx.fillStyle='#FFD700';ctx.font='bold 40px "Comic Sans MS","Baloo 2",system-ui';
    ctx.fillText(starsStr,DW/2,DH/2+15);

    // Next level button
    const nbx=DW/2-80,nby=DH/2+50,nbw=160,nbh=45;
    ctx.fillStyle='#58D68D';ctx.beginPath();roundRect(ctx,nbx,nby,nbw,nbh,15);ctx.fill();
    ctx.strokeStyle='#2E7D32';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 20px "Comic Sans MS","Baloo 2",system-ui';
    if(currentLevel<MAX_LEVELS)ctx.fillText('Next Level →',DW/2,nby+30);
    else ctx.fillText('All Done! 🏆',DW/2,nby+30);

    if(input.tap&&hitRect(input.tapX,input.tapY,nbx,nby,nbw,nbh)){
      input.tap=false;sfxButton();
      if(currentLevel<MAX_LEVELS){
        currentLevel++;
        initBuildPhase(currentLevel);
        gameState=STATE.BUILD;
        enteredFrame=true;
      }else{
        gameState=STATE.LEVEL_SELECT;
      }
    }

    // Levels button
    const lbx=DW/2-80,lby=nby+55,lbw=160,lbh=40;
    ctx.fillStyle='#5DADE2';ctx.beginPath();roundRect(ctx,lbx,lby,lbw,lbh,12);ctx.fill();
    ctx.fillStyle='#FFF';ctx.font='bold 16px "Comic Sans MS","Baloo 2",system-ui';
    ctx.fillText('Level Select',DW/2,lby+28);
    if(input.tap&&hitRect(input.tapX,input.tapY,lbx,lby,lbw,lbh)){input.tap=false;sfxButton();gameState=STATE.LEVEL_SELECT;}
  }

  // Ad break hook (after levels 3 and 7)
  if(currentLevel===3||currentLevel===7){
    if(playGameOver&&!playCandies.length){
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(DW/2-120,DH/2-180,240,80);
      ctx.fillStyle='#999';ctx.font='16px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
      ctx.fillText('[Ad Break Placeholder]',DW/2,DH/2-140);
    }
  }
}

// ── RESULT / STICKER BOOK ────────────────────────────────────────────────────
function drawResultScreen(){drawStartScreen();} // fallback

// ── STICKER BOOK STATE ──────────────────────────────────────────────────────
function drawStickerBook(){
  const grad=ctx.createLinearGradient(0,0,0,DH);
  grad.addColorStop(0,'#FFF8DC');grad.addColorStop(1,'#FAEBD7');
  ctx.fillStyle=grad;ctx.fillRect(0,0,DW,DH);

  ctx.fillStyle='#5C3A1E';ctx.font='bold 32px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('📒 Sticker Book',DW/2,70);

  const stickerList=['star','heart','flower','crown','rainbow','butterfly','sun','puffy'];
  const cols=4,rows=Math.ceil(stickerList.length/cols);
  const cellW=140,cellH=140,startX=(DW-cols*cellW)/2,startY=120;

  for(let i=0;i<stickerList.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const cx=startX+col*cellW+cellW/2,cy=startY+row*cellH+cellH/2;
    const owned=!!progress.stickerBook[stickerList[i]]||!!progress.stickerBook[`level${i+1}`];
    if(owned){
      drawSticker(ctx,cx,cy,40,stickerList[i],STICKER_COLORS[i]);
    }else{
      ctx.fillStyle='#DDD';ctx.beginPath();ctx.arc(cx,cy,40,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#999';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#999';ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText('?',cx,cy+10);
    }
  }

  ctx.fillStyle='#5C3A1E';ctx.font='16px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('Earn 2★+ on levels to unlock stickers!',DW/2,DH-100);

  // Back button
  ctx.fillStyle='#E74C3C';ctx.beginPath();roundRect(ctx,20,20,100,45,15);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 18px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('← Back',70,50);

  if(input.tap&&hitRect(input.tapX,input.tapY,20,20,100,45)){input.tap=false;sfxButton();gameState=STATE.START;}
}

// ── ROUND RECT HELPER ──────────────────────────────────────────────────────
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── MONETIZATION: UNLOCK ALL (decorative) ────────────────────────────────────
function drawUnlockAllButton(){
  ctx.fillStyle='#FFD700';ctx.beginPath();roundRect(ctx,DW-140,10,130,35,10);ctx.fill();
  ctx.fillStyle='#5C3A1E';ctx.font='bold 14px "Comic Sans MS","Baloo 2",system-ui';ctx.textAlign='center';
  ctx.fillText('🔓 Unlock All',DW-75,33);
  if(input.tap&&hitRect(input.tapX,input.tapY,DW-140,10,130,35)){
    input.tap=false;sfxButton();
    progress.unlocked=MAX_LEVELS;saveProgress();
    spawnParticles(DW-75,28,15,'#FFD700');
  }
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────
function gameLoop(timestamp){
  const dt=lastTime?(timestamp-lastTime)/1000:0.016;
  lastTime=timestamp;
  frameCount++;

  update(dt);
  draw();

  // Draw unlock all on level select
  if(gameState===STATE.LEVEL_SELECT)drawUnlockAllButton();
  // Sticker book state
  if(gameState==='stickerBook'){drawStickerBook();if(input.tap)input.tap=false;}

  requestAnimationFrame(gameLoop);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  resize();
  initBuildPhase(1);
  loadAssets(()=>{
    console.log(`Poppu Cardboard Castle v2.0 loaded — ${assetsLoaded}/${totalAssets} assets`);
  });
  requestAnimationFrame(gameLoop);
}

// Click handler for first interaction (audio context)
document.addEventListener('click',()=>initAudio(),{once:true});
document.addEventListener('touchstart',()=>initAudio(),{once:true});

init();
</script>
